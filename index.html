<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hex to ASCII (Little-Endian) Converter</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #1e293b;
            width: 100%;
            max-width: 700px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
        }

        h2 {
            margin-bottom: 8px;
            color: #38bdf8;
            font-size: 24px;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #cbd5e1;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            height: 150px;
            background-color: #0f172a;
            border: 1px solid #475569;
            border-radius: 8px;
            padding: 12px;
            color: #e2e8f0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: #38bdf8;
        }

        .btn-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background-color: #0ea5e9;
            color: white;
        }

        .btn-primary:hover {
            background-color: #0284c7;
        }

        .btn-secondary {
            background-color: #475569;
            color: #e2e8f0;
        }

        .btn-secondary:hover {
            background-color: #334155;
        }

        .result-box {
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 15px;
            position: relative;
            min-height: 60px;
        }

        .result-text {
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            color: #4ade80;
            word-break: break-all;
            white-space: pre-wrap;
        }

        .btn-copy {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #334155;
            color: #cbd5e1;
            padding: 4px 8px;
            font-size: 11px;
            border-radius: 4px;
            width: auto;
        }

        .btn-copy:hover {
            background-color: #475569;
            color: white;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Stack Dump Hex to ASCII Converter</h2>
        <p class="subtitle">Format String Vulnerability Flag Extractor (Little-Endian)</p>

        <div class="form-group">
            <label for="inputHex">Masukkan Log / Mentahan Dump Hex:</label>
            <textarea id="inputHex" placeholder="Contoh: Here's your order: AAAAAA,0x7b4654436f636970,0x355f31346d316e34..."></textarea>
        </div>

        <div class="btn-container">
            <button class="btn-primary" onclick="processConversion()">Konversi Ke ASCII</button>
            <button class="btn-secondary" onclick="clearAll()">Bersihkan</button>
        </div>

        <div class="form-group">
            <label>Hasil Ekstraksi:</label>
            <div class="result-box">
                <button class="btn-copy" id="copyBtn" onclick="copyResult()">Salin</button>
                <div id="outputResult" class="result-text">Hasil teks akan muncul di sini...</div>
            </div>
        </div>
    </div>

    <script>
        function hexToAsciiLittleEndian(text) {
            if (!text) return "Input kosong.";
            
            // Mengambil token setelah mendepak teks bawaan jika ada
            const cleanInput = text.replace(/Here's your order:\s*/i, "");
            const tokens = cleanInput.split(',');
            let fullResult = "";

            tokens.forEach(token => {
                const cleanToken = token.trim();
                if (cleanToken.startsWith('0x')) {
                    let hex = cleanToken.substring(2);

                    if (hex.length % 2 !== 0) {
                        hex = '0' + hex;
                    }

                    let asciiStr = "";
                    // Loop mundur untuk mengatasi Little-Endian
                    for (let i = hex.length - 2; i >= 0; i -= 2) {
                        const byte = hex.substring(i, i + 2);
                        const code = parseInt(byte, 16);

                        // Karakter ASCII yang printable
                        if (code >= 32 && code <= 126) {
                            asciiStr += String.fromCharCode(code);
                        }
                    }

                    if (asciiStr) {
                        fullResult += asciiStr;
                    }
                }
            });

            return fullResult || "Tidak ditemukan string hex yang valid atau menghasilkan karakter printable.";
        }

        function processConversion() {
            const inputData = document.getElementById('inputHex').value;
            const hasil = hexToAsciiLittleEndian(inputData);
            document.getElementById('outputResult').innerText = hasil;
        }

        function clearAll() {
            document.getElementById('inputHex').value = "";
            document.getElementById('outputResult').innerText = "Hasil teks akan muncul di sini...";
            document.getElementById('copyBtn').innerText = "Salin";
        }

        function copyResult() {
            const textToCopy = document.getElementById('outputResult').innerText;
            if (textToCopy && textToCopy !== "Hasil teks akan muncul di sini..." && textToCopy !== "Input kosong.") {
                navigator.clipboard.writeText(textToCopy).then(() => {
                    const copyBtn = document.getElementById('copyBtn');
                    copyBtn.innerText = "Tersalin!";
                    setTimeout(() => { copyBtn.innerText = "Salin"; }, 2000);
                });
            }
        }
    </script>
</body>

</html>
